        "name": "مولد رابط واتساب",

<body>
    <!-- 🌌 ANIMATED BACKGROUND -->
    <div class="background-container" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
        <canvas id="particles-canvas"></canvas>
    </div>
    
    <!-- 📦 MAIN APPLICATION -->
    <div class="app-container">
        
        <!-- Skip Link (Accessibility) -->
        <a href="#main-card" class="skip-link">تخطي إلى المحتوى الرئيسي</a>
        
        <!-- 🏷️ HEADER -->
        <header class="header">
            <div class="brand-header">
                <span class="brand-name">FALCON01 TEAM</span>
            </div>
            <div class="logo-container">
                <div class="logo-icon" aria-hidden="true">
                    <i class="fab fa-whatsapp"></i>
                </div>
            </div>
            <h1 class="main-title">مولد رابط واتساب</h1>
            <p class="subtitle">أنشئ رابط واتساب مباشر لأي رقم سعودي</p>
        </header>
        
        <!-- 💎 MAIN CARD -->
        <main class="glass-card" id="main-card">
            
            <!-- Input Section -->
            <div class="input-wrapper">
                <label for="phoneNumber" class="sr-only">رقم الجوال السعودي</label>
                <input 
                    type="tel" 
                    id="phoneNumber" 
                    class="input-field" 
                    placeholder="أدخل رقم الجوال (مثال: 05XXXXXXXX)"
                    inputmode="tel"
                    autocomplete="tel"
                    maxlength="20"
                    aria-describedby="phone-hint"
                    aria-required="true">
                <i class="fas fa-phone input-icon" aria-hidden="true"></i>
                <div class="input-border-animation" aria-hidden="true"></div>
                <small id="phone-hint" class="input-hint">أدخل رقم سعودي يبدأ بـ 05</small>
            </div>
            
            <!-- Action Buttons -->
            <div class="button-group" role="group" aria-label="إجراءات الرابط">
                <button class="btn btn-primary" id="generateBtn" type="button">
                    <i class="fas fa-link" aria-hidden="true"></i>
                    <span>إنشاء الرابط</span>
                </button>
                <button class="btn btn-lookup" id="lookupBtn" type="button">
                    <i class="fas fa-search" aria-hidden="true"></i>
                    <span>استعلام عن الرقم</span>
                </button>
            </div>
            <div class="button-group button-group-secondary" role="group" aria-label="إجراءات إضافية">
                <button class="btn btn-secondary" id="clearBtn" type="button">
                    <i class="fas fa-eraser" aria-hidden="true"></i>
                    <span>مسح</span>
                </button>
                <button class="btn btn-tertiary" id="shareBtn" type="button">
                    <i class="fas fa-share-alt" aria-hidden="true"></i>
                    <span>مشاركة</span>
                </button>
            </div>
            
            <!-- Result Container -->
            <div class="result-container" id="result" role="status" aria-live="polite"></div>
            
            <!-- Error Container -->
            <div class="error-message" id="error" role="alert" aria-live="assertive" style="display: none;"></div>
            
        </main>
        
        <!-- 📜 HISTORY SECTION -->
        <section class="history-section" id="history-section" style="display: none;" aria-label="سجل الروابط السابقة">
            <div class="history-header">
                <i class="fas fa-history" style="color: var(--neon-purple);" aria-hidden="true"></i>
                <h2 class="history-title">آخر الروابط</h2>
                <span class="history-badge" id="historyBadge" aria-label="عدد الروابط المحفوظة">0</span>
                <button class="clear-history-btn" id="clearHistoryBtn" type="button" aria-label="مسح جميع الروابط المحفوظة" title="مسح السجل">
                    <i class="fas fa-trash-alt" aria-hidden="true"></i>
                </button>
            </div>
            <ul class="history-list" id="historyList"></ul>
        </section>
        
        <!-- 🖼️ FOOTER -->
        <footer class="footer">
            <!-- PWA Install Button (hidden until available) -->
            <button class="pwa-install-btn" id="pwaInstallBtn" type="button" style="display: none;">
                <i class="fas fa-download" aria-hidden="true"></i>
                <span>تثبيت كتطبيق</span>
            </button>
            
            <p class="copyright">© 2026 Falcon01 Team. All Rights Reserved.</p>
            <p class="certified-badge">
                <i class="fas fa-shield-alt" aria-hidden="true"></i>
                <span>Official Certified Site</span>
            </p>
        </footer>
        
        <!-- Offline Indicator -->
        <div class="offline-banner" id="offlineBanner" role="alert" style="display: none;">
            <i class="fas fa-wifi" aria-hidden="true"></i>
            <span>أنت غير متصل بالإنترنت — التطبيق يعمل من الذاكرة المؤقتة</span>
        </div>
        
    </div>
    
    <!-- 📜 SCRIPTS -->
    <script src="js/particles.js?v=0.5.0"></script>
    <script src="js/animations.js?v=0.5.0"></script>
    <script src="js/app.js?v=0.5.0"></script>
